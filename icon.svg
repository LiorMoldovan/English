<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="50%" style="stop-color:#2d1b69"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Sparkle top-left -->
  <circle cx="100" cy="100" r="6" fill="#ffd93d" opacity="0.7"/>
  <circle cx="140" cy="80" r="4" fill="#4ecdc4" opacity="0.5"/>
  <!-- Sparkle top-right -->
  <circle cx="410" cy="90" r="5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="380" cy="120" r="3" fill="#ff6b6b" opacity="0.5"/>
  <!-- Sparkle bottom -->
  <circle cx="120" cy="420" r="4" fill="#4ecdc4" opacity="0.5"/>
  <circle cx="400" cy="400" r="5" fill="#ffd93d" opacity="0.6"/>
  <!-- Main "W" letter -->
  <text x="256" y="300" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="260" fill="url(#letter)">W</text>
  <!-- Star above the W -->
  <polygon points="256,60 270,110 322,110 280,142 296,192 256,162 216,192 232,142 190,110 242,110" fill="url(#star)"/>
  <!-- Hebrew letter below -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="80" fill="#4ecdc4" opacity="0.8">̃</text>
</svg>
